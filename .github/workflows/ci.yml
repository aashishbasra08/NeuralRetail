# .github/workflows/ci-cd.yml
# This file defines the complete CI/CD pipeline using GitHub Actions.
# On every push to main or develop, it runs lint, tests, model validation,
# then builds and pushes Docker images to GitHub Container Registry.

name: NeuralRetail CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff black pytest pytest-cov

      - name: Lint with Ruff
        run: ruff check src/ dashboard/ --fix

      - name: Format check with Black
        run: black --check src/ dashboard/

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml
        env:
          MLFLOW_TRACKING_URI: sqlite:///test_mlflow.db

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  model-validation:
    name: Model Quality Gate
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ML dependencies
        run: pip install -r requirements.txt

      - name: Run model validation
        run: python tests/validate_models.py
        env:
          MAPE_THRESHOLD: "12.0"
          AUC_THRESHOLD: "0.88"

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-test, model-validation]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.fastapi
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-fastapi:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-fastapi:${{ github.sha }}

      - name: Build & Push Streamlit image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.streamlit
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-streamlit:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-streamlit:${{ github.sha }}

      - name: Post success notification
        run: |
          echo "Images pushed successfully!"
          echo "FastAPI: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-fastapi:${{ github.sha }}"