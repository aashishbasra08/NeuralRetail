# monitoring/prometheus.yml
# This file tells Prometheus which services to scrape metrics from.
# It checks FastAPI every 15 seconds on the /metrics endpoint.

global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "neuralretail-fastapi"
    static_configs:
      - targets: ["fastapi:8000"]
    metrics_path: /metrics

  - job_name: "neuralretail-streamlit"
    static_configs:
      - targets: ["streamlit:8501"]