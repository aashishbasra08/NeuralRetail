# k8s/fastapi-deployment.yaml
# This file tells Kubernetes how to deploy the FastAPI service.
# It creates 2 copies of the container for high availability.
# HPA automatically adds more copies if CPU goes above 70%.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuralretail-fastapi
  namespace: neuralretail
  labels:
    app: fastapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
      - name: fastapi
        image: ghcr.io/aashishbasra08/neuralretail-fastapi:latest
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: neuralretail-secrets
              key: postgres-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

---

# This section defines auto-scaling rules for the FastAPI deployment.
# Minimum 2 pods, maximum 8 pods, scale up when CPU crosses 70%.

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastapi-hpa
  namespace: neuralretail
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: neuralretail-fastapi
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70